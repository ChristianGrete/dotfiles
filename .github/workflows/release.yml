name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: Version bump level
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push as the token owner (a repository admin) so the release commit
          # bypasses the branch ruleset. The default GITHUB_TOKEN cannot be
          # added to the ruleset bypass list.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          ssh-keygen -y -f ~/.ssh/signing_key > ~/.ssh/signing_key.pub

      - name: Configure git
        run: |
          git config --global user.name 'Christian Grete'
          git config --global user.email 'webmaster@christiangrete.com'
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/signing_key.pub
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true

      - name: Run release
        run: |
          chmod +x libexec/*
          libexec/changelog > "$RUNNER_TEMP/release_notes.md"
          libexec/release '${{ inputs.level }}'

      - name: Push branch and tag
        run: |
          git push origin HEAD
          git push origin "v$(cat VERSION)"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(cat VERSION)"
          gh release create "v$version" \
            --title "v$version" \
            --notes-file "$RUNNER_TEMP/release_notes.md"
