name: Check

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  check:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get install -y zsh

      - name: Lint
        run: make lint

      - name: Build
        run: make build
